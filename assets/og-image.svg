    <circle cx="636" cy="568" r="1.4" fill="#fff5dc"/>
    <circle cx="206" cy="524" r="1.1" fill="#d8eef7"/>
  </g>

  <rect x="38" y="34" width="1124" height="562" fill="none" stroke="#d8eef7" stroke-opacity="0.28"/>

  <g transform="translate(72 62)">
    <g transform="scale(0.78)">
      <line x1="22" y1="60" x2="78" y2="38" stroke="#fff5dc" stroke-width="2.75" stroke-linecap="round"/>
      <circle cx="22" cy="60" r="14" fill="#5fc9d6" stroke="#d8eef7" stroke-width="2.25"/>
      <circle cx="22" cy="60" r="5.2" fill="#091522" opacity="0.72"/>
      <circle cx="78" cy="38" r="7.5" fill="#091522" stroke="#e58a5a" stroke-width="2.75"/>
      <circle cx="78" cy="38" r="2.45" fill="#e58a5a"/>
      <polyline points="76,45 68,62 76,68 60,86" fill="none" stroke="#e58a5a" stroke-width="2.35" stroke-linecap="round" stroke-linejoin="round"/>
      <circle cx="60" cy="86" r="5" fill="#091522" stroke="#e58a5a" stroke-width="2.25"/>
    </g>
    <text x="82" y="42" fill="#fff5dc" font-family="Georgia, serif" font-size="38" font-weight="600">Pondera</text>
    <text x="0" y="106" fill="#7dd7e8" font-family="Consolas, monospace" font-size="15" font-weight="700" letter-spacing="2.3">GRAPH-FIRST MATHS PROJECT</text>
  </g>

  <g transform="translate(72 218)">
    <text x="0" y="0" fill="#fff5dc" font-family="Georgia, serif" font-size="62">Curriculum as an</text>
    <text x="0" y="66" fill="#fff5dc" font-family="Georgia, serif" font-size="62">inspectable</text>
    <text x="0" y="132" fill="#fff5dc" font-family="Georgia, serif" font-size="62">knowledge</text>
    <text x="0" y="198" fill="#fff5dc" font-family="Georgia, serif" font-size="62">constellation.</text>
    <text x="2" y="258" fill="#a9b7bc" font-family="Inter, Arial, sans-serif" font-size="22">Graph-first K-12 maths ontology,</text>
    <text x="2" y="288" fill="#a9b7bc" font-family="Inter, Arial, sans-serif" font-size="22">diagnostics, and evidence trails.</text>
  </g>

  <g transform="translate(72 514)">
    <rect x="0" y="0" width="156" height="58" fill="#0b1b29" stroke="#7dd7e8" stroke-opacity="0.5"/>
    <text x="18" y="27" fill="#fff5dc" font-family="Georgia, serif" font-size="25" font-weight="700">2,600+</text>
    <text x="18" y="45" fill="#d8eef7" font-family="Consolas, monospace" font-size="10" letter-spacing="1.4">GRAPH NODES</text>
    <rect x="174" y="0" width="156" height="58" fill="#0b1b29" stroke="#7dd7e8" stroke-opacity="0.5"/>
    <text x="192" y="27" fill="#fff5dc" font-family="Georgia, serif" font-size="25" font-weight="700">4,400+</text>
    <text x="192" y="45" fill="#d8eef7" font-family="Consolas, monospace" font-size="10" letter-spacing="1.4">AUTHORED EDGES</text>
    <rect x="348" y="0" width="156" height="58" fill="#0b1b29" stroke="#7dd7e8" stroke-opacity="0.5"/>
    <text x="366" y="27" fill="#fff5dc" font-family="Georgia, serif" font-size="25" font-weight="700">K-12</text>
    <text x="366" y="45" fill="#d8eef7" font-family="Consolas, monospace" font-size="10" letter-spacing="1.4">MATHS GRAPH</text>
  </g>

