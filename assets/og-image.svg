    <text x="28" y="56" fill="#d8eef7" fill-opacity="0.66" font-family="Consolas, monospace" font-size="11" font-weight="700" letter-spacing="1.5">KNOWLEDGE / SIGNAL / REPAIR</text>
    <line x1="0" y1="70" x2="482" y2="70" stroke="#d8eef7" stroke-opacity="0.16"/>
    <marker id="ogArrowBlue" markerWidth="8" markerHeight="8" refX="7" refY="4" orient="auto">
