    <text x="28" y="320" fill="#d8eef7" fill-opacity="0.62" font-family="Consolas, monospace" font-size="9" font-weight="700" letter-spacing="1.5">DIAGNOSIS + REMEDIATION</text>
    <line x1="28" y1="330" x2="454" y2="330" stroke="#d8eef7" stroke-opacity="0.1"/>

    <path d="M84 140 L166 140" fill="none" stroke="#7dd7e8" stroke-width="1.8" marker-end="url(#ogArrowBlue)"/>
