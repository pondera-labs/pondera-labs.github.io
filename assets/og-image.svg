    <text x="232" y="318" fill="#ffbea3" font-family="Consolas, monospace" font-size="9" font-weight="700">DIAGNOSTIC SIGNAL</text>
    <text x="116" y="344" fill="#ffbea3" font-family="Consolas, monospace" font-size="10" font-weight="700">ADDS DENOMINATORS</text>
    <text x="140" y="358" fill="#ffbea3" font-family="Consolas, monospace" font-size="9" font-weight="700">MISCONCEPTION</text>
    <path d="M204 292 L306 292" fill="none" stroke="#b9a1ff" stroke-width="1.7" marker-end="url(#ogArrowViolet)"/>
    <text x="286" y="274" fill="#b9a1ff" font-family="Consolas, monospace" font-size="10" font-weight="700">REPAIR</text>
    <path d="M330 280 C330 214 258 164 202 146" fill="none" stroke="#b9a1ff" stroke-width="1.7" marker-end="url(#ogArrowViolet)"/>

