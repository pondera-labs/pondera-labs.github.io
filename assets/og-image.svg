    <path d="M404 246 C374 286 356 318 348 342" fill="none" stroke="#ff9b73" stroke-width="1.7" stroke-opacity="0.5"/>

    <g filter="url(#softGlow)">
      <circle cx="84" cy="254" r="12" fill="#8ee0b0"/>
      <circle cx="182" cy="116" r="12" fill="#7dd7e8"/>
      <circle cx="236" cy="188" r="15" fill="#fff5dc"/>
      <circle cx="404" cy="122" r="12" fill="#ff9b73"/>
      <circle cx="404" cy="246" r="12" fill="#8ee0b0"/>
      <circle cx="168" cy="326" r="12" fill="#b9a1ff"/>
      <circle cx="348" cy="342" r="12" fill="#7dd7e8"/>
    </g>

    <text x="44" y="288" fill="#d8eef7" font-family="Consolas, monospace" font-size="12" font-weight="700">UNIT FRACTIONS</text>
    <text x="126" y="98" fill="#d8eef7" font-family="Consolas, monospace" font-size="12" font-weight="700">DENOMINATOR MEANING</text>
    <text x="190" y="170" fill="#fff5dc" font-family="Consolas, monospace" font-size="12" font-weight="700">ADD SAME DENOMINATORS</text>
    <text x="314" y="104" fill="#ffbea3" font-family="Consolas, monospace" font-size="12" font-weight="700">MISCONCEPTION SIGNAL</text>
    <text x="332" y="276" fill="#d8eef7" font-family="Consolas, monospace" font-size="12" font-weight="700">EQUIVALENT FRACTIONS</text>
    <text x="104" y="360" fill="#d8eef7" font-family="Consolas, monospace" font-size="12" font-weight="700">REPAIR CARD</text>
    <text x="292" y="376" fill="#d8eef7" font-family="Consolas, monospace" font-size="12" font-weight="700">EVIDENCE EVENT</text>
  </g>
</svg>
