    <text x="216" y="386" fill="#ffbea3" font-family="Consolas, monospace" font-size="10" font-weight="700">SIGNAL</text>
    <line x1="306" y1="382" x2="338" y2="382" stroke="#b9a1ff" stroke-width="2" stroke-opacity="0.78"/>
    <text x="346" y="386" fill="#d8eef7" font-family="Consolas, monospace" font-size="10" font-weight="700">REPAIR</text>
