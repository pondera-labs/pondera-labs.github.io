    <text x="18" y="27" fill="#fff5dc" font-family="Georgia, serif" font-size="25" font-weight="700">2,600+</text>
    <text x="18" y="45" fill="#d8eef7" font-family="Consolas, monospace" font-size="10" letter-spacing="1.4">GRAPH NODES</text>
    <rect x="174" y="0" width="156" height="58" fill="#0b1b29" stroke="#7dd7e8" stroke-opacity="0.5"/>
    <text x="192" y="27" fill="#fff5dc" font-family="Georgia, serif" font-size="25" font-weight="700">4,400+</text>
    <text x="192" y="45" fill="#d8eef7" font-family="Consolas, monospace" font-size="10" letter-spacing="1.4">AUTHORED EDGES</text>
    <rect x="348" y="0" width="156" height="58" fill="#0b1b29" stroke="#7dd7e8" stroke-opacity="0.5"/>
    <text x="366" y="27" fill="#fff5dc" font-family="Georgia, serif" font-size="25" font-weight="700">K-12</text>
    <text x="366" y="45" fill="#d8eef7" font-family="Consolas, monospace" font-size="10" letter-spacing="1.4">MATHS GRAPH</text>
  </g>

