<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-labelledby="title desc">
  <title id="title">Pondera</title>
  <desc id="desc">A graph-first maths project for curriculum ontology, diagnostics, and evidence trails.</desc>
  <defs>
    <radialGradient id="bg" cx="54%" cy="38%" r="88%">
      <stop offset="0" stop-color="#17364c"/>
      <stop offset="0.52" stop-color="#10283a"/>
      <stop offset="1" stop-color="#07121d"/>
    </radialGradient>
    <linearGradient id="panel" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#153044" stop-opacity="0.92"/>
      <stop offset="1" stop-color="#081724" stop-opacity="0.96"/>
    </linearGradient>
    <filter id="softGlow" x="-80%" y="-80%" width="260%" height="260%">
      <feGaussianBlur stdDeviation="5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <pattern id="grid" width="46" height="46" patternUnits="userSpaceOnUse">
      <path d="M46 0H0V46" fill="none" stroke="#d8eef7" stroke-opacity="0.045" stroke-width="1"/>
    </pattern>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#grid)" opacity="0.72"/>

  <g opacity="0.62">
    <circle cx="68" cy="86" r="1.4" fill="#fff5dc"/>
    <circle cx="174" cy="182" r="1.1" fill="#d8eef7"/>
    <circle cx="304" cy="66" r="1.5" fill="#fff5dc"/>
    <circle cx="496" cy="138" r="1.2" fill="#d8eef7"/>
    <circle cx="764" cy="92" r="1.6" fill="#fff5dc"/>
    <circle cx="1088" cy="118" r="1.3" fill="#d8eef7"/>
    <circle cx="1134" cy="344" r="1.5" fill="#fff5dc"/>
    <circle cx="944" cy="548" r="1.1" fill="#d8eef7"/>
    <circle cx="636" cy="568" r="1.4" fill="#fff5dc"/>
    <circle cx="206" cy="524" r="1.1" fill="#d8eef7"/>
  </g>

  <rect x="38" y="34" width="1124" height="562" fill="none" stroke="#d8eef7" stroke-opacity="0.28"/>

  <g transform="translate(72 62)">
    <g transform="scale(0.78)">
      <line x1="22" y1="60" x2="78" y2="38" stroke="#fff5dc" stroke-width="2.75" stroke-linecap="round"/>
      <circle cx="22" cy="60" r="14" fill="#5fc9d6" stroke="#d8eef7" stroke-width="2.25"/>
      <circle cx="22" cy="60" r="5.2" fill="#091522" opacity="0.72"/>
      <circle cx="78" cy="38" r="7.5" fill="#091522" stroke="#e58a5a" stroke-width="2.75"/>
      <circle cx="78" cy="38" r="2.45" fill="#e58a5a"/>
      <polyline points="76,45 68,62 76,68 60,86" fill="none" stroke="#e58a5a" stroke-width="2.35" stroke-linecap="round" stroke-linejoin="round"/>
      <circle cx="60" cy="86" r="5" fill="#091522" stroke="#e58a5a" stroke-width="2.25"/>
