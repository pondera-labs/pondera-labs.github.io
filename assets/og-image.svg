    <text x="38" y="166" fill="#d8eef7" font-family="Consolas, monospace" font-size="10" font-weight="700">UNIT FRACTIONS</text>
    <text x="136" y="166" fill="#d8eef7" font-family="Consolas, monospace" font-size="10" font-weight="700">DENOMINATOR MEANING</text>
    <text x="266" y="166" fill="#fff5dc" font-family="Consolas, monospace" font-size="10" font-weight="700">ADD SAME</text>
    <text x="226" y="126" fill="#7dd7e8" font-family="Consolas, monospace" font-size="9" font-weight="700">KEY FIX IDENTIFIED</text>

