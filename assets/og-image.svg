      <circle cx="314" cy="140" r="12" fill="#091522" stroke="#fff5dc" stroke-width="2"/>
      <circle cx="188" cy="292" r="13" fill="#091522" stroke="#ff9b73" stroke-width="2.4"/>
      <circle cx="330" cy="292" r="11" fill="#091522" stroke="#b9a1ff" stroke-width="2"/>
