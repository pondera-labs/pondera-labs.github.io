    <text x="28" y="36" fill="#d8eef7" fill-opacity="0.76" font-family="Consolas, monospace" font-size="12" font-weight="700" letter-spacing="1.7">LOCAL DIAGNOSTIC CONSTELLATION</text>
    <text x="28" y="56" fill="#d8eef7" fill-opacity="0.66" font-family="Consolas, monospace" font-size="11" font-weight="700" letter-spacing="1.5">KNOWLEDGE / SIGNAL / REPAIR</text>
    <line x1="0" y1="70" x2="482" y2="70" stroke="#d8eef7" stroke-opacity="0.16"/>

    <circle cx="244" cy="224" r="158" fill="none" stroke="#d8eef7" stroke-opacity="0.08"/>
    <circle cx="244" cy="224" r="92" fill="none" stroke="#d8eef7" stroke-opacity="0.08" stroke-dasharray="5 9"/>

    <path d="M84 254 C150 160 184 136 236 188" fill="none" stroke="#7dd7e8" stroke-width="2" stroke-opacity="0.58"/>
    <path d="M236 188 C270 128 334 98 404 122" fill="none" stroke="#ff9b73" stroke-width="2" stroke-opacity="0.66"/>
    <path d="M236 188 C296 240 348 252 404 246" fill="none" stroke="#8ee0b0" stroke-width="2" stroke-opacity="0.58"/>
    <path d="M84 254 C202 278 292 276 404 246" fill="none" stroke="#7dd7e8" stroke-width="1.7" stroke-opacity="0.35"/>
    <path d="M168 326 C220 260 238 232 236 188" fill="none" stroke="#d8eef7" stroke-width="1.7" stroke-opacity="0.52"/>
